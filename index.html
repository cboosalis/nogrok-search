<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>No Grok Search</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#ffffff">
</head>

<body>

<div class="container">

    <img
        src="icon-192.png"
        class="logo"
        alt="No Grok Search">

    <h1>No Grok Search</h1>

    <form id="searchForm" autocomplete="off">

        <div class="searchBox">

            <span class="searchIcon">
                🔍
            </span>

            <input
                id="q"
                type="search"
                placeholder="Search Google..."
                spellcheck="false"
                autocomplete="off"
                autocapitalize="off"
                autofocus>

        </div>

        <div class="buttons">

            <button type="submit">
                Google Search
            </button>

        </div>

    </form>

</div>

<script src="app.js"></script>

</body>
</html>
